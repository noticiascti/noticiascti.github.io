<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Validador IOC — iSecurity</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Inter', sans-serif; }
.card { background: #111827; border-radius: 8px; padding: 18px; border: 1px solid #1f2937; }
table.compact th, table.compact td { padding: 10px 8px; border-bottom: 1px dashed rgba(255,255,255,0.08); color:#e5e7eb; }
table.compact thead th { background:#0f1724; color:#cbd5e1; font-weight:600; font-size:13px; }
.btn { background:#111827; border:1px solid #374151; color:#e5e7eb; padding:6px 10px; border-radius:6px; font-size:13px; }
.mono { font-family: monospace; }
</style>
</head>

<body class="bg-gray-900 text-gray-200">

<!-- HEADER -->
<header class="bg-gray-950 p-4 border-b border-gray-700 flex items-center space-x-3" onclick="window.location.href='/index.html'">
<img src="https://isecurityqa.com/wp-content/uploads/2025/03/isecurity_logo-c.png" class="h-8">
<h1 class="text-2xl font-bold text-yellow-400">Validador IOC</h1>
</header>

<!-- NAV -->
<nav class="bg-gray-950 border-b border-gray-700 p-4">
<a href="/index.html" class="hover:text-yellow-400">🏠 Inicio</a>
</nav>

<main class="p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">

<!-- INPUT -->
<section class="lg:col-span-4">
<div class="card">

<input type="password" id="password" placeholder="Password"
class="w-full bg-gray-800 border border-gray-700 p-3 rounded mb-3">

<textarea id="iocInput" rows="10"
class="w-full bg-gray-800 border border-gray-700 p-3 rounded mono"
placeholder="IOC separados por coma o espacio"></textarea>

<button onclick="startAnalysis()"
class="mt-3 w-full bg-yellow-500 text-black py-2 rounded">
Analizar
</button>

<div id="estimate" class="text-sm text-gray-400 mt-2"></div>
<div id="timer" class="text-yellow-400"></div>

</div>
</section>

<!-- RESULTADOS -->
<section class="lg:col-span-8">
<div class="card">

<table class="w-full compact">
<thead>
<tr>
<th>IOC</th>
<th>Tipo</th>
<th>Maltiverse</th>
<th>VirusTotal</th>
<th>Veredicto</th>
</tr>
</thead>

<tbody id="results"></tbody>
</table>

<button onclick="exportCSV()" class="btn mt-4">Exportar CSV</button>

</div>
</section>

</main>

<script>

const API_URL = "https://iocvalidator.vercel.app";
let token = null;
let lastResults = [];

async function login(password){
    const res = await fetch(API_URL + "/api/login", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({password})
    });
    const data = await res.json();
    return data.token;
}

function estimate(count){
    const rate = 40;
    return Math.ceil(count / rate);
}

function startTimer(minutes){
    let sec = minutes * 60;
    const int = setInterval(()=>{
        sec--;
        let m = Math.floor(sec/60);
        let s = sec%60;
        document.getElementById("timer").innerText = `${m}:${s.toString().padStart(2,"0")}`;
        if(sec<=0) clearInterval(int);
    },1000);
}

async function startAnalysis(){

    const text = document.getElementById("iocInput").value;
    const password = document.getElementById("password").value;

    const iocs = text.split(/[\s,]+/).filter(x=>x);

    token = await login(password);
    if(!token) return alert("Password incorrecta");

    const minutes = estimate(iocs.length);
    document.getElementById("estimate").innerText = `Tiempo estimado: ${minutes} min`;
    startTimer(minutes);

    const res = await fetch(API_URL + "/api/validate-ioc", {
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":`Bearer ${token}`
        },
        body: JSON.stringify({iocs})
    });

    const data = await res.json();
    render(data.results);
}

function render(results){

    lastResults = results;
    const table = document.getElementById("results");
    table.innerHTML = "";

    results.forEach(r=>{

        let color="text-green-400";
        if(r.verdict==="malicious") color="text-red-400";
        if(r.verdict==="suspicious") color="text-yellow-400";

        table.innerHTML += `
        <tr>
        <td class="mono">${r.ioc}</td>
        <td>${r.type}</td>

        <td>
        ${r.maltiverse?.classification || "-"}<br>
        <span class="text-xs text-gray-400">
        Primera vez visto: ${r.maltiverse?.first_seen || "-"}<br>
        Última vez visto: ${r.maltiverse?.last_seen || "-"}
        </span>
        </td>

        <td>${r.vt?.summary || "-"}</td>

        <td class="${color} font-bold">${r.verdict}</td>
        </tr>`;
    });
}

function exportCSV(){
    const rows = lastResults.map(r=>[
        r.ioc,
        r.type,
        r.maltiverse?.classification || "",
        r.maltiverse?.first_seen || "",
        r.maltiverse?.last_seen || "",
        r.vt?.summary || "",
        r.verdict
    ]);

    const csv = [["IOC","Tipo","Maltiverse","Primera vez visto","Última vez visto","VT","Veredicto"],...rows]
        .map(e=>e.join(",")).join("\n");

    const blob = new Blob([csv]);
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href=url;
    a.download="ioc_results.csv";
    a.click();
}

</script>

</body>
</html>
