<!DOCTYPE html>
<html lang="es">
<head>
  <base href="https://noticiascti.github.io/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validador IOC</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }

    .card {
      background:#111827;
      border-radius:12px;
      padding:20px;
      border:1px solid #1f2937;
    }

    table {
      width:100%;
      table-layout: fixed; /* 🔥 clave para alineación */
    }

    th, td {
      padding:12px;
      text-align:left;
      vertical-align:top;
    }

    th {
      color:#cbd5e1;
      font-size:13px;
      border-bottom:1px solid #1f2937;
    }

    td {
      border-bottom:1px dashed rgba(255,255,255,0.08);
    }

    .mono { font-family: monospace; }

    .small {
      font-size:12px;
      color:#9ca3af;
    }
  </style>
</head>

<body class="bg-gray-900 text-gray-200">

<!-- HEADER -->
<div class="bg-gray-950 p-4 border-b border-gray-700 flex items-center space-x-3 cursor-pointer"
     onclick="window.location.href='./index.html'">
  <img src="https://isecurityqa.com/wp-content/uploads/2025/03/isecurity_logo-c.png" class="h-8">
  <h1 class="text-2xl font-bold text-yellow-400">Noticias CTI</h1>
</div>

<!-- NAV -->
<nav class="bg-gray-950 border-b border-gray-700 p-4">
  <a href="./index.html" class="hover:text-yellow-400">🏠 Inicio</a>
</nav>

<!-- CONTENIDO -->
<div class="p-6">

  <div class="card">

    <h2 class="text-xl font-bold text-yellow-400 mb-4">🔎 Validador IOC</h2>

    <input type="password" id="password"
      placeholder="Password"
      class="w-full bg-gray-800 border border-gray-700 p-3 rounded mb-3">

    <textarea id="iocInput" rows="6"
      class="w-full bg-gray-800 border border-gray-700 p-3 rounded mono"
      placeholder="Ej: 1.1.1.1, dominio.com, hash"></textarea>

    <button onclick="startAnalysis()"
      class="mt-3 bg-yellow-500 hover:bg-yellow-400 text-black font-semibold py-2 px-4 rounded">
      Analizar
    </button>

    <div id="estimate" class="text-sm text-gray-400 mt-2"></div>
    <div id="timer" class="text-yellow-400 font-bold"></div>

    <div class="overflow-x-auto mt-6">
      <table>

        <!-- 🔥 widths fijos -->
        <colgroup>
          <col style="width:20%">
          <col style="width:10%">
          <col style="width:30%">
          <col style="width:25%">
          <col style="width:15%">
        </colgroup>

        <thead>
          <tr>
            <th>IOC</th>
            <th>Tipo</th>
            <th>Maltiverse</th>
            <th>VirusTotal</th>
            <th>Veredicto</th>
          </tr>
        </thead>

        <tbody id="results"></tbody>

      </table>
    </div>

    <button onclick="exportCSV()" class="mt-4 bg-gray-700 px-3 py-1 rounded">
      Exportar CSV
    </button>

  </div>

</div>

<script>

const API_URL = "https://iocvalidator.vercel.app";
let lastResults = [];

function colorVerdict(v) {
    if (v === "Malicioso") return "text-red-400";
    if (v === "Sospechoso") return "text-yellow-400";
    return "text-green-400";
}

async function login(password){
    const res = await fetch(API_URL + "/api/login", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({password})
    });
    const data = await res.json();
    return data.token;
}

function estimate(count){
    return Math.ceil(count / 40);
}

function startTimer(minutes){
    let sec = minutes * 60;
    const int = setInterval(()=>{
        sec--;
        let m = Math.floor(sec/60);
        let s = sec%60;
        document.getElementById("timer").innerText =
            `${m}:${s.toString().padStart(2,"0")}`;
        if(sec<=0) clearInterval(int);
    },1000);
}

async function startAnalysis(){

    const text = document.getElementById("iocInput").value;
    const password = document.getElementById("password").value;

    const iocs = text.split(/[\s,]+/).filter(x=>x);

    const token = await login(password);
    if(!token) return alert("Password incorrecta");

    const minutes = estimate(iocs.length);
    document.getElementById("estimate").innerText =
        `Tiempo estimado: ${minutes} min`;

    startTimer(minutes);

    const res = await fetch(API_URL + "/api/validate-ioc", {
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":`Bearer ${token}`
        },
        body: JSON.stringify({iocs})
    });

    const data = await res.json();
    render(data.results);
}

function render(results){

    lastResults = results;
    const table = document.getElementById("results");
    table.innerHTML = "";

    results.forEach(r=>{

        table.innerHTML += `
        <tr>

          <td class="mono">${r.ioc}</td>

          <td>${r.type}</td>

          <td>
            <div class="font-semibold">${r.maltiverse?.classification || "-"}</div>
            <div class="small">Primera vez: ${r.maltiverse?.primera_vez || "-"}</div>
            <div class="small">Última vez: ${r.maltiverse?.ultima_vez || "-"}</div>
          </td>

          <td>
            ${r.vt?.summary
              ? `<a href="${r.vt.link}" target="_blank" class="text-yellow-400 underline">
                   ${r.vt.summary}
                 </a>`
              : "-"}
          </td>

          <td class="${colorVerdict(r.verdict)} font-bold text-right">
            ${r.verdict}
          </td>

        </tr>`;
    });
}

function exportCSV(){

    const rows = lastResults.map(r=>[
        r.ioc,
        r.type,
        r.maltiverse?.classification || "",
        r.maltiverse?.primera_vez || "",
        r.maltiverse?.ultima_vez || "",
        r.vt?.summary || "",
        r.vt?.link || "",
        r.verdict
    ]);

    const csv = [
        ["IOC","Tipo","Maltiverse","Primera vez","Última vez","VT","VT_Link","Veredicto"],
        ...rows
    ].map(e=>e.join(",")).join("\n");

    const blob = new Blob([csv]);
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "ioc_results.csv";
    a.click();
}

</script>

</body>
</html>
