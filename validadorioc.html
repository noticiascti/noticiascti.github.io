<!DOCTYPE html>
<html lang="es">
<head>
  <base href="https://noticiascti.github.io/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validador IOC — iSecurity</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }

    .card {
      background:#111827;
      border-radius:12px;
      padding:20px;
      border:1px solid #1f2937;
    }

    table {
      width:100%;
      table-layout: fixed;
    }

    th, td {
      padding:12px;
      text-align:left;
      vertical-align:top;
    }

    th {
      color:#cbd5e1;
      font-size:13px;
      border-bottom:1px solid #1f2937;
    }

    td {
      border-bottom:1px dashed rgba(255,255,255,0.08);
    }

    .hash {
      word-break: break-all;
      font-family: monospace;
    }

    .small {
      font-size:12px;
      color:#9ca3af;
    }
  </style>
</head>

<body class="bg-gray-900 text-gray-200">

<!-- HEADER -->
<header class="bg-gray-950 p-4 border-b border-gray-700 flex items-center space-x-3 cursor-pointer"
        onclick="window.location.href='/index.html'">
  <img src="https://isecurityqa.com/wp-content/uploads/2025/03/isecurity_logo-c.png" class="h-8">
  <h1 class="text-2xl font-bold text-yellow-400">Validador IOC</h1>
</header>

<!-- NAV -->
<nav class="bg-gray-950 border-b border-gray-700">
  <ul class="flex flex-col md:flex-row md:space-x-6 p-4 md:p-2">

    <li><a href="/index.html" class="hover:text-yellow-400">🏠 Inicio</a></li>

    <li class="relative group">
      <button class="hover:text-yellow-400 flex items-center">
        🔒 Noticias Ciberseguridad ▾
      </button>
      <ul class="absolute hidden group-hover:block bg-gray-900 border border-gray-700 mt-2 rounded-lg w-56 z-50">
        <li><a href="/index.html#incidentes" class="block px-4 py-2 hover:bg-yellow-500 hover:text-black">💥 Incidentes</a></li>
        <li><a href="/index.html#tendencias" class="block px-4 py-2 hover:bg-yellow-500 hover:text-black">📊 Tendencias</a></li>
        <li><a href="/index.html#locales" class="block px-4 py-2 hover:bg-yellow-500 hover:text-black">🇨🇱 Locales</a></li>
        <li><a href="/index.html#prevencion" class="block px-4 py-2 hover:bg-yellow-500 hover:text-black">💡 Prevención</a></li>
      </ul>
    </li>

    <li><a href="/medios.html" class="hover:text-yellow-400">📰 Medios</a></li>
    <li><a href="/status.html" class="hover:text-yellow-400">📊 Status</a></li>
    <li><a href="/ransom_vulnerabilidades.html" class="hover:text-yellow-400">⚡ Vulnerabilidades</a></li>
    <li><a href="/reclamos.html" class="hover:text-yellow-400">📣 Reclamos</a></li>

    <li><a href="/validadorioc.html" class="text-yellow-400 font-bold">🔎 Validador IOC</a></li>

  </ul>
</nav>

<!-- CONTENIDO -->
<div class="p-6">

  <div class="card">

    <h2 class="text-xl font-bold text-yellow-400 mb-4">🔎 Validador IOC</h2>

    <input type="password" id="password"
      placeholder="Password"
      class="w-full bg-gray-800 border border-gray-700 p-3 rounded mb-3">

    <textarea id="iocInput" rows="6"
      class="w-full bg-gray-800 border border-gray-700 p-3 rounded"
      placeholder="Ej: 1.1.1.1, dominio.com, hash"></textarea>

    <button onclick="startAnalysis()"
      class="mt-3 bg-yellow-500 hover:bg-yellow-400 text-black font-semibold py-2 px-4 rounded">
      Analizar
    </button>

    <div id="estimate" class="text-sm text-gray-400 mt-2"></div>
    <div id="timer" class="text-yellow-400 font-bold"></div>

    <div class="overflow-x-auto mt-6">
      <table>

        <colgroup>
          <col style="width:25%">
          <col style="width:10%">
          <col style="width:25%">
          <col style="width:20%">
          <col style="width:10%">
          <col style="width:10%">
        </colgroup>

        <thead>
          <tr>
            <th>IOC</th>
            <th>Tipo</th>
            <th>Maltiverse</th>
            <th>VirusTotal</th>
            <th title="Score basado en detección, inteligencia y actividad reciente">Score ISecurity</th>
            <th>Nivel de Riesgo</th>
          </tr>
        </thead>

        <tbody id="results"></tbody>

      </table>
    </div>

    <button onclick="exportCSV()" class="mt-4 bg-gray-700 px-3 py-1 rounded">
      Exportar CSV
    </button>

  </div>

</div>

<script>

const API_URL = "https://iocvalidator.vercel.app";
let lastResults = [];

// 🎨 COLORES NUEVOS
function colorVerdict(v) {
    if (v === "Crítico") return "text-red-500";
    if (v === "Alto") return "text-orange-400";
    if (v === "Sospechoso") return "text-yellow-400";
    if (v === "Bajo") return "text-blue-400";
    return "text-gray-400";
}

function colorScore(score){
    if (score >= 85) return "text-red-500";
    if (score >= 60) return "text-orange-400";
    if (score >= 30) return "text-yellow-400";
    if (score >= 10) return "text-blue-400";
    return "text-gray-400";
}

async function login(password){
    const res = await fetch(API_URL + "/api/login", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({password})
    });
    const data = await res.json();
    return data.token;
}

function estimate(count){
    return Math.ceil(count / 40);
}

function startTimer(minutes){
    let sec = minutes * 60;
    const int = setInterval(()=>{
        sec--;
        let m = Math.floor(sec/60);
        let s = sec%60;
        document.getElementById("timer").innerText =
            `${m}:${s.toString().padStart(2,"0")}`;
        if(sec<=0) clearInterval(int);
    },1000);
}

async function startAnalysis(){

    const text = document.getElementById("iocInput").value;
    const password = document.getElementById("password").value;

    const iocs = text.split(/[\s,]+/).filter(x=>x);

    const token = await login(password);
    if(!token) return alert("Password incorrecta");

    const minutes = estimate(iocs.length);
    document.getElementById("estimate").innerText =
        `Tiempo estimado: ${minutes} min`;

    startTimer(minutes);

    const res = await fetch(API_URL + "/api/validate-ioc", {
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":`Bearer ${token}`
        },
        body: JSON.stringify({iocs})
    });

    const data = await res.json();
    lastResults = data.results;
    render(data.results);
}

function render(results){

    results.sort((a, b) => b.score - a.score);

    const table = document.getElementById("results");
    table.innerHTML = "";

    results.forEach(r=>{

        const sinDatos = r.maltiverse?.classification === "sin_datos";

        const maltiverseBlock = sinDatos
            ? "Sin información"
            : `${r.maltiverse?.classification}
               <div class="small">
                 Primera vez visto: ${r.maltiverse?.primera_vez || "-"}<br>
                 Última vez visto: ${r.maltiverse?.ultima_vez || "-"}
               </div>`;

        const vtPercent = r.vt && r.vt.total
            ? Math.round((r.vt.malicious / r.vt.total) * 100)
            : 0;

        const vtBlock = r.vt
            ? `<a href="${r.vt.link}" target="_blank" class="text-yellow-400 underline">
                ${r.vt.summary} (${vtPercent}%)
               </a>
               <div class="small">
                 Primera vez visto: ${r.vt?.primera_vez || "-"}<br>
                 Última vez visto: ${r.vt?.ultima_vez || "-"}
               </div>`
            : "-";

        table.innerHTML += `
        <tr>
          <td class="hash">${r.ioc}</td>
          <td>${r.type}</td>
          <td>${maltiverseBlock}</td>
          <td>${vtBlock}</td>
          <td class="${colorScore(r.score)} font-bold">${r.score}</td>
          <td class="${colorVerdict(r.verdict)} font-bold text-right">${r.verdict}</td>
        </tr>`;
    });
}

function exportCSV(){

    const rows = lastResults.map(r=>[
        r.ioc,
        r.type,
        r.maltiverse?.classification || "",
        r.maltiverse?.primera_vez || "",
        r.maltiverse?.ultima_vez || "",
        r.vt?.summary || "",
        r.vt?.primera_vez || "",
        r.vt?.ultima_vez || "",
        r.score,
        r.verdict
    ]);

    const csv = [
        ["IOC","Tipo","Maltiverse","M_First","M_Last","VT","VT_First","VT_Last","Score","Nivel"],
        ...rows
    ].map(e=>e.join(",")).join("\n");

    const blob = new Blob([csv]);
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href=url;
    a.download="ioc_results.csv";
    a.click();
}

</script>

</body>
</html>
